<head>
  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js",
        "vue-demi": "https://unpkg.com/vue-demi@0.14.7/lib/index.mjs"
      }
    }
  </script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/lodash@4.17.21/lodash.min.js"></script>
  <script src="https://unpkg.com/zod@3.22.4/lib/index.umd.js"></script>
  <script>
    window.z = window.Zod;
    window.z.ZodType.prototype.prefault = window.z.ZodType.prototype.default;
    
    // Global Error Catcher for easier debugging
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.body.innerHTML += '<div style="color: red; font-size: 20px; z-index: 9999; position: absolute; background: white; padding: 10px;">ERROR: ' + msg + '<br>' + (error ? error.stack : '') + '</div>';
    };
    window.onunhandledrejection = function(e) {
      document.body.innerHTML += '<div style="color: red; font-size: 20px; z-index: 9999; position: absolute; background: white; padding: 10px;">PROMISE ERROR: ' + e.reason + '</div>';
    };

    // Mock SillyTavern environment
    if (typeof window.getCurrentMessageId === 'undefined') {
      window.getCurrentMessageId = () => 1;
      window.waitGlobalInitialized = async () => {};
      
      window.mock_stat_data = {
        时间系统: {
          日期: '2015年04月09日-星期四',
          时段: '放学后',
          天气: '阴',
          当前地点: '东京·涉谷'
        }
      };

      window.getVariables = () => ({ stat_data: window.mock_stat_data });
      window.$ = (fn) => setTimeout(fn, 100);
      window.errorCatched = (fn) => fn;
      window.ignoreUpdates = (fn) => fn();
      window.updateVariablesWith = () => {};
      window.useIntervalFn = () => {};
      window.watchIgnorable = () => ({ ignoreUpdates: (f) => f() });
    }
  </script>
</head>
<body>
  <div id="app"></div>
</body>
